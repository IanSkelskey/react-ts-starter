name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token; CI only needs to read the repo contents.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run verify
